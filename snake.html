<!DOCTYPE html>
<html>
<head>
  <title>Simple Snake Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    canvas {
      background: #222;
      border: 3px solid white;
      margin-top: 20px;
    }

    #score {
      font-size: 22px;
      margin-top: 10px;
    }

    #gameOverBox {
      display: none;
      margin-top: 20px;
    }

    #gameOverBox h2 {
      color: red;
    }

    button {
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: limegreen;
      color: white;
    }

    button:hover {
      background: green;
    }
  </style>
</head>
<body>

  <h1>Snake Game</h1>
  <div id="score">Score: 0</div>

  <canvas id="game" width="400" height="400"></canvas>

  <div id="gameOverBox">
    <h2>Game Over!</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart Game</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const gameOverBox = document.getElementById("gameOverBox");
    const finalScore = document.getElementById("finalScore");

    const box = 20;
    const rows = canvas.height / box;
    const cols = canvas.width / box;

    let snake;
    let direction;
    let nextDirection;
    let score;
    let apple;
    let bomb;
    let bombVisible;
    let bombTimer;
    let game;

    function startGame() {
      snake = [
        { x: 9 * box, y: 10 * box }
      ];

      direction = "RIGHT";
      nextDirection = "RIGHT";
      score = 0;
      bomb = null;
      bombVisible = false;

      scoreText.innerText = "Score: 0";
      gameOverBox.style.display = "none";

      apple = getRandomPosition();

      clearInterval(game);
      clearTimeout(bombTimer);

      game = setInterval(drawGame, 120);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft" && direction !== "RIGHT") {
        nextDirection = "LEFT";
      } else if (event.key === "ArrowUp" && direction !== "DOWN") {
        nextDirection = "UP";
      } else if (event.key === "ArrowRight" && direction !== "LEFT") {
        nextDirection = "RIGHT";
      } else if (event.key === "ArrowDown" && direction !== "UP") {
        nextDirection = "DOWN";
      }
    });

    function getRandomPosition() {
      return {
        x: Math.floor(Math.random() * cols) * box,
        y: Math.floor(Math.random() * rows) * box
      };
    }

    function drawBox(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, box, box);
      ctx.strokeStyle = "#111";
      ctx.strokeRect(x, y, box, box);
    }

    function drawApple() {
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(
        apple.x + box / 2,
        apple.y + box / 2,
        box / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawBomb() {
      if (!bombVisible || !bomb) return;

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(
        bomb.x + box / 2,
        bomb.y + box / 2,
        box / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      ctx.fillStyle = "orange";
      ctx.font = "16px Arial";
      ctx.fillText("💣", bomb.x + 1, bomb.y + 17);
    }

    function showBomb() {
      bomb = getRandomPosition();
      bombVisible = true;

      clearTimeout(bombTimer);

      bombTimer = setTimeout(function() {
        bombVisible = false;
        bomb = null;
      }, 5000);
    }

    function moveSnake() {
      direction = nextDirection;

      let head = {
        x: snake[0].x,
        y: snake[0].y
      };

      if (direction === "LEFT") head.x -= box;
      if (direction === "UP") head.y -= box;
      if (direction === "RIGHT") head.x += box;
      if (direction === "DOWN") head.y += box;

      // Snake goes through walls
      if (head.x < 0) head.x = canvas.width - box;
      if (head.x >= canvas.width) head.x = 0;
      if (head.y < 0) head.y = canvas.height - box;
      if (head.y >= canvas.height) head.y = 0;

      snake.unshift(head);

      // If snake eats apple
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        scoreText.innerText = "Score: " + score;
        apple = getRandomPosition();

        // Show bomb after every 5 apples
        if (score % 5 === 0) {
          showBomb();
        }

      } else {
        snake.pop();
      }

      // If snake touches bomb
      if (
        bombVisible &&
        bomb &&
        head.x === bomb.x &&
        head.y === bomb.y
      ) {
        endGame();
      }
    }

    function endGame() {
      clearInterval(game);
      clearTimeout(bombTimer);

      finalScore.innerText = "Your score is: " + score;
      gameOverBox.style.display = "block";
    }

    function restartGame() {
      startGame();
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawApple();
      drawBomb();

      for (let i = 0; i < snake.length; i++) {
        drawBox(snake[i].x, snake[i].y, i === 0 ? "lime" : "green");
      }

      moveSnake();
    }

    startGame();
  </script>

</body>
</html>
